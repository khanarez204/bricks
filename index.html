<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bricks Marketing | Building Dreams, Delivering Investments + Admin Suite</title>
    <meta name="description" content="Premium real estate marketing and investment opportunities with advanced admin control.">
    
    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Libraries -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#D4AF37',
                            dark: '#0A0A0A',
                            surface: '#121212',
                            accent: '#1E1E1E'
                        }
                    },
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .text-gradient {
            background: linear-gradient(to right, #D4AF37, #FBF5B7, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-zoom {
            animation: kenburns 20s infinite alternate;
        }
        @keyframes kenburns {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .admin-scroll::-webkit-scrollbar { width: 6px; }
        .admin-scroll::-webkit-scrollbar-track { background: #1e1e1e; }
        .admin-scroll::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        /* Fix chatbot on mobile */
        @media (max-width: 640px) {
            .chat-window-mobile {
                position: fixed !important;
                bottom: 80px !important;
                right: 16px !important;
                width: calc(100vw - 32px) !important;
                max-width: 380px !important;
                height: 500px !important;
                left: auto !important;
            }
        }
    </style>
</head>
<body class="bg-brand-dark text-white font-sans overflow-x-hidden"

      @scroll.window="scrolled = (window.pageYOffset > 50)"

                        <a href="#" class="hover:text-brand-gold transition-colors">About</a>
                        <a href="#" class="hover:text-brand-gold transition-colors">Insights</a>

                                </div>
                            </div>

                    </div>
                </div>
            </section>

    <script>
        function app() {
            return {
                adminActive: false,
                scrolled: false,
                mobileMenu: false,
                properties: [],
                leads: [],
                bookings: [],
                recentActivities: [],
                adminTab: 'properties',
                showBookingModal: false,
                bookingTarget: null,
                bookingForm: { name: '', email: '', phone: '', cnic: '', contactMethod: 'WhatsApp' },
                customLogoUrl: '',
                imageManagerOpen: false,
                currentImageProperty: null,
                currentImages: [],
                selectedCurrency: 'PKR',
                conversionRate: 280,
                
                async initApp() { 
                    this.loadData(); 
                    if(!this.properties.length) this.seedData(); 
                    this.saveData();
                    let savedLogo = localStorage.getItem('bricks_logo');
                    if(savedLogo) this.customLogoUrl = savedLogo;
                    let savedCurrency = localStorage.getItem('bricks_currency');
                    let savedRate = localStorage.getItem('bricks_rate');
                    if(savedCurrency) this.selectedCurrency = savedCurrency;
                    if(savedRate) this.conversionRate = parseFloat(savedRate);
                    
                    // Listen for storage events to sync across tabs/windows
                    window.addEventListener('storage', (e) => {
                        if (e.key === 'bricks_properties') {
                            this.properties = JSON.parse(e.newValue);
                        }
                        if (e.key === 'bricks_leads') this.leads = JSON.parse(e.newValue);
                        if (e.key === 'bricks_bookings') this.bookings = JSON.parse(e.newValue);
                        if (e.key === 'bricks_activities') this.recentActivities = JSON.parse(e.newValue);
                        if (e.key === 'bricks_logo') this.customLogoUrl = e.newValue;
                        if (e.key === 'bricks_currency') this.selectedCurrency = e.newValue;
                        if (e.key === 'bricks_rate') this.conversionRate = parseFloat(e.newValue);
                    });
                },
                loadData() { 
                    let p = localStorage.getItem('bricks_properties'); 
                    let l = localStorage.getItem('bricks_leads'); 
                    let b = localStorage.getItem('bricks_bookings'); 
                    let a = localStorage.getItem('bricks_activities'); 
                    if(p) this.properties = JSON.parse(p); 
                    if(l) this.leads = JSON.parse(l); 
                    if(b) this.bookings = JSON.parse(b); 
                    if(a) this.recentActivities = JSON.parse(a); 
                },
                saveData() { 
                    localStorage.setItem('bricks_properties', JSON.stringify(this.properties)); 
                    localStorage.setItem('bricks_leads', JSON.stringify(this.leads)); 
                    localStorage.setItem('bricks_bookings', JSON.stringify(this.bookings)); 
                    localStorage.setItem('bricks_activities', JSON.stringify(this.recentActivities.slice(-30))); 
                },
                seedData() { 
                    this.properties = [ 
                        { id: 'prop1', title: 'The Golden Sands Villa', location: 'Palm Jumeirah, Dubai', price: 12500000, status: 'Available', beds: 6, sqft: 8500, images: ['https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&q=80'], description: 'Luxury beachfront' }, 
                        { id: 'prop2', title: 'Azure Sky Penthouse', location: 'Manhattan, NYC', price: 8900000, status: 'Available', beds: 4, sqft: 4200, images: ['https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80'] }, 
                        { id: 'prop3', title: 'The Obsidian Estate', location: 'Zurich, Switzerland', price: 24000000, status: 'Available', beds: 7, sqft: 12000, images: ['https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80'] } 
                    ]; 
                },
                formatPriceUSD(priceUSD) { 
                    if(this.selectedCurrency === 'PKR') {
                        let pkr = priceUSD * this.conversionRate;
                        return '₨ ' + pkr.toLocaleString();
                    } else {
                        return '$ ' + priceUSD.toLocaleString();
                    }
                },
                formatCurrency(priceUSD) {
                    return this.formatPriceUSD(priceUSD);
                },
                openAdminLogin() { 
                    let email = prompt('Admin Email:'); 
                    let pwd = prompt('Password:'); 
                    if(email === 'admin@bricks.com' && pwd === 'Admin2024!') { 
                        this.adminActive = true; 
                        this.addActivity('Admin logged in'); 
                    } else alert('Invalid credentials. Use admin@bricks.com / Admin2024!'); 
                },
                logoutAdmin() { 
                    this.adminActive = false; 
                    this.addActivity('Admin logout');
                    if (window.location.pathname === '/admin') history.pushState(null, '', '/');
                },
                addActivity(msg) { this.recentActivities.unshift(new Date().toLocaleTimeString() + ' - ' + msg); this.saveData(); },
                
                openAddPropertyModal() { 
                    let title = prompt('Title'); 
                    let loc = prompt('Location'); 
                    let price = prompt('Price USD'); 
                    if(title && loc && price) { 
                        let newProp = { id: Date.now().toString(), title, location: loc, price: parseFloat(price), status: 'Available', beds: 4, sqft: 3000, images: ['https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&q=80'] }; 
                        this.properties.push(newProp); 
                        this.saveData(); 
                        this.addActivity(`Property ${title} added`); 
                    } 
                },
                editProperty(prop) { 
                    let newTitle = prompt('New title', prop.title); 
                    if(newTitle) prop.title = newTitle; 
                    let newPrice = prompt('Price (USD)', prop.price); 
                    if(newPrice) prop.price = parseFloat(newPrice); 
                    let newStatus = prompt('Status (Available/Reserved/Sold)', prop.status); 
                    if(newStatus) prop.status = newStatus; 
                    this.saveData(); 
                    this.addActivity(`Property ${prop.title} updated`); 
                },
                deleteProperty(id) { 
                    if(confirm('Delete?')) { 
                        this.properties = this.properties.filter(p=>p.id!==id); 
                        this.saveData(); 
                        this.addActivity('Property deleted'); 
                    } 
                },
                managePropertyImages(prop) {
                    this.currentImageProperty = prop;
                    this.currentImages = [...prop.images];
                    this.imageManagerOpen = true;
                },
                addImageUrl() {
                    let url = prompt('Enter image URL (must be direct link to image):');
                    if(url && url.trim()) {
                        this.currentImages.push(url.trim());
                        this.currentImageProperty.images = this.currentImages;
                        this.saveData();
                        this.addActivity(`Added image to ${this.currentImageProperty.title}`);
                    }
                },
                triggerPngUpload() { this.$refs.pngUploader.click(); },
                handlePngUpload(event) {
                    const file = event.target.files[0];
                    if(file && file.type === 'image/png') {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.currentImages.push(e.target.result);
                            this.currentImageProperty.images = this.currentImages;
                            this.saveData();
                            this.addActivity(`Uploaded PNG image to ${this.currentImageProperty.title}`);
                        };
                        reader.readAsDataURL(file);
                    } else if(file) alert('Please select a PNG file.');
                },
                uploadLogoPng(event) {
                    const file = event.target.files[0];
                    if(file && file.type === 'image/png') {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            this.customLogoUrl = e.target.result;
                            this.saveLogo();
                        };
                        reader.readAsDataURL(file);
                    } else if(file) alert('Please select a PNG file.');
                },
                removePropertyImage(idx) {
                    if(confirm('Remove this image?')) {
                        this.currentImages.splice(idx,1);
                        this.currentImageProperty.images = this.currentImages;
                        this.saveData();
                        this.addActivity(`Removed image from ${this.currentImageProperty.title}`);
                    }
                },
                saveLogo() {
                    localStorage.setItem('bricks_logo', this.customLogoUrl);
                    this.addActivity('Logo updated');
                    alert('Logo saved! Refresh frontend to see changes.');
                },
                saveCurrencySettings() {
                    localStorage.setItem('bricks_currency', this.selectedCurrency);
                    localStorage.setItem('bricks_rate', this.conversionRate);
                    this.addActivity(`Currency set to ${this.selectedCurrency}, rate ${this.conversionRate}`);
                    alert('Currency settings saved! Frontend will now show prices in ' + this.selectedCurrency);
                },
                
                startBooking(property) { this.bookingTarget = property; this.bookingForm = { name: '', email: '', phone: '', cnic: '', contactMethod: 'WhatsApp' }; this.showBookingModal = true; },
                async submitBookingRequest() { 
                    if(!this.bookingForm.name || !this.bookingForm.email || !this.bookingForm.phone) return alert('Please fill name, email, phone'); 
                    let booking = { id: Date.now().toString(), propertyId: this.bookingTarget.id, propertyTitle: this.bookingTarget.title, fullName: this.bookingForm.name, email: this.bookingForm.email, phone: this.bookingForm.phone, cnic: this.bookingForm.cnic, contactMethod: this.bookingForm.contactMethod, status: 'Pending', createdAt: new Date().toISOString() }; 
                    this.bookings.push(booking); 
                    let lead = { id: Date.now()+'lead', name: this.bookingForm.name, email: this.bookingForm.email, phone: this.bookingForm.phone, propertyInterest: this.bookingTarget.title, conversationSummary: `Booking request for ${this.bookingTarget.title}`, date: new Date().toISOString() }; 
                    this.leads.push(lead); 
                    this.properties = this.properties.map(p => p.id === this.bookingTarget.id ? { ...p, status: 'Reserved' } : p); 
                    this.saveData(); 
                    this.addActivity(`New booking from ${this.bookingForm.name} for ${this.bookingTarget.title}`); 
                    alert('Booking request sent! Admin notified.'); 
                    this.showBookingModal = false; 
                },
                updateBookingStatus(bookingId, newStatus) { 
                    let booking = this.bookings.find(b=>b.id===bookingId); 
                    if(booking) { 
                        booking.status = newStatus; 
                        let property = this.properties.find(p=>p.id===booking.propertyId); 
                        if(property && newStatus==='Approved') property.status = 'Sold'; 
                        else if(newStatus==='Rejected') property.status = 'Available'; 
                        this.saveData(); 
                        this.addActivity(`Booking ${bookingId} ${newStatus}`); 
                    } 
                },
                assignAgent(bookingId) { 
                    let agent = prompt('Assign sales agent name'); 
                    if(agent) this.addActivity(`Agent ${agent} assigned to booking ${bookingId}`); 
                },
                
                sendAIMessage() { 
                    let msg = this.userInput.trim(); 
                    if(!msg) return; 
                    this.messages.push({role:'user', text:msg}); 
                    this.userInput = ''; 
                    setTimeout(() => this.processAIResponse(msg), 300); 
                },
                processAIResponse(msg) { 
                    let lower = msg.toLowerCase(); 
                    let propertyRef = this.properties.find(p => lower.includes(p.title.toLowerCase()) || lower.includes(p.location.toLowerCase())); 
                    if(lower.includes('book') || lower.includes('reserve') || lower.includes('interested')) { 
                        if(propertyRef) { 
                            this.messages.push({role:'ai', text:`Great! I can help book ${propertyRef.title}. Please share your Full Name, Email, and Phone number to proceed.`}); 
                            this.tempBookingData = { property: propertyRef }; 
                        } else { 
                            this.messages.push({role:'ai', text:'Which property would you like to book? Share the name (Golden Sands Villa, Azure Sky Penthouse, Obsidian Estate).'}); 
                        } 
                    } else if(this.tempBookingData && !this.tempBookingData.name && msg.trim().split(' ').length >= 2) { 
                        this.tempBookingData.name = msg; 
                        this.messages.push({role:'ai', text:'Thanks! Now your email address please.'}); 
                    } else if(this.tempBookingData && this.tempBookingData.name && !this.tempBookingData.email && msg.includes('@')) { 
                        this.tempBookingData.email = msg; 
                        this.messages.push({role:'ai', text:'Perfect! Finally your phone number with country code.'}); 
                    } else if(this.tempBookingData && this.tempBookingData.email && !this.tempBookingData.phone && msg.length>5) { 
                        this.tempBookingData.phone = msg; 
                        this.createAICBooking(); 
                        this.tempBookingData = null; 
                    } else { 
                        let propList = this.properties.map(p=>`${p.title} (${p.location}, ${this.formatCurrency(p.price)})`).join(', '); 
                        this.messages.push({role:'ai', text:`As Bricks AI consultant, I recommend ${propList}. Want a viewing or booking?`}); 
                    } 
                },
                createAICBooking() { 
                    let booking = { id: Date.now().toString(), propertyId: this.tempBookingData.property.id, propertyTitle: this.tempBookingData.property.title, fullName: this.tempBookingData.name, email: this.tempBookingData.email, phone: this.tempBookingData.phone, status: 'Pending', createdAt: new Date().toISOString() }; 
                    this.bookings.push(booking); 
                    this.leads.push({ id: Date.now()+'lead', name: this.tempBookingData.name, email: this.tempBookingData.email, phone: this.tempBookingData.phone, propertyInterest: this.tempBookingData.property.title, conversationSummary: 'AI assisted booking', date: new Date().toISOString() }); 
                    this.properties = this.properties.map(p=>p.id===this.tempBookingData.property.id ? {...p, status:'Reserved'} : p); 
                    this.saveData(); 
                    this.addActivity(`AI booking from ${this.tempBookingData.name} for ${this.tempBookingData.property.title}`); 
                    this.messages.push({role:'ai', text:`Booking request created for ${this.tempBookingData.property.title}! We'll contact you within 2 hours.`}); 
                }
            }
        }
    </script>
    <script>
        window.addEventListener('load', () => { 
            gsap.registerPlugin(ScrollTrigger); 
            gsap.to('.reveal-y', {opacity:1, y:-20, duration:1, stagger:0.2, ease:"power4.out"}); 
            if (window.location.pathname === '/admin' || window.location.pathname.endsWith('/admin')) {
                setTimeout(() => {
                    const adminBtn = document.querySelector('#adminPortalBtn');
                    if (adminBtn && typeof adminBtn.click === 'function') {
                        adminBtn.click();
                        history.pushState(null, '', '/');
                    } else {
                        const btn = Array.from(document.querySelectorAll('button')).find(b => b.innerText.includes('Admin Portal'));
                        if (btn) btn.click();
                        history.pushState(null, '', '/');
                    }
                }, 500);
            }
        });
    </script>
</body>
</html>
